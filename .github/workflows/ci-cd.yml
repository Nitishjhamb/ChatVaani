name: CI/CD for ChatVaani

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        env:
          VITE_API_KEY: ${{ secrets.API_KEY }}
          VITE_BASE_PATH: "/ChatVaani/" # Add base path environment variable
        run: |
          npm run build
          # Create 404.html for client-side routing fallback
          cp dist/index.html dist/404.html

      - name: Debug Build Output
        run: |
          echo "Listing dist contents:"
          ls -la dist || echo "dist folder not found"
          echo "Checking index.html:"
          grep 'src="/ChatVaani/' dist/index.html || echo 'Path check failed'

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true # Preserve 404.html
