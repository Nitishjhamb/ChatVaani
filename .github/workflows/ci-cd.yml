name: CI/CD for ChatVaani

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest # Default to Ubuntu, but test with windows-latest below
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        env:
          VITE_API_KEY: ${{ secrets.API_KEY }}
        run: npm run build

      - name: Debug Build Output
        run: |
          echo "Listing dist contents:"
          dir dist # Windows-compatible command
          if exist dist (echo "dist exists") else (echo "dist missing" & exit /b 1)

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: build-output
          path: dist
          if-no-files-found: error

  # Optional: Test with Windows runner
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        env:
          VITE_API_KEY: ${{ secrets.API_KEY }}
        run: npm run build

      - name: Debug Build Output
        run: |
          echo "Listing dist contents:"
          dir dist
          if exist dist (echo "dist exists") else (echo "dist missing" & exit /b 1)

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: build-output-windows
          path: dist
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build # Depends on the Ubuntu build for now
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v3
        with:
          name: build-output
          path: dist

      - name: Debug Downloaded Artifact
        run: |
          echo "Listing downloaded dist contents:"
          dir dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
