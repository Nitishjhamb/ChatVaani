name: CI/CD for ChatVaani

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        env:
          VITE_API_KEY: ${{ secrets.API_KEY }}
        run: npm run build

      - name: Verify Build Output
        run: ls -la dist # Check if dist folder exists (Linux command for GitHub's Ubuntu runner)

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: build-output # Consistent artifact name
          path: dist
          if-no-files-found: error # Fail if dist is empty or missing

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v3
        with:
          name: build-output # Match the name from upload
          path: dist

      - name: Verify Downloaded Artifact
        run: ls -la dist # Confirm the artifact was downloaded

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
